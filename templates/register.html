{% extends "base.html" %}

{% block title %}Register - SportsGear{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="section-header" style="justify-content:center;text-align:center;margin-bottom:1.5rem;">
            <div>
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join the sports platform and gear up.</p>
            </div>
        </div>

        <form method="POST" action="/register" class="form-grid">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@university.edu" required>
            </div>

            <div class="form-grid-2" style="margin-bottom:0;">
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" placeholder="e.g. Computer Science" required>
                </div>
                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="text" id="year" name="year" placeholder="e.g. 2nd Year" required>
                </div>
            </div>

            <div class="form-group">
                <label for="contact">Contact Number</label>
                <input type="tel" id="contact" name="contact" placeholder="+91 99999 99999" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">Create My Account</button>
        </form>

        <p class="auth-note">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>
{% endblock %}
